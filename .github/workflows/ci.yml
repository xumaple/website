name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "passwords/**"
      - ".github/workflows/**"
  push:
    branches: [main]
    paths:
      - "passwords/**"
      - ".github/workflows/**"

jobs:
  rust-tests:
    uses: ./.github/workflows/_rust-tests.yml
    secrets: inherit

  js-tests:
    uses: ./.github/workflows/_js-tests.yml
    secrets: inherit

  e2e-tests:
    uses: ./.github/workflows/_e2e-tests.yml
    secrets: inherit
