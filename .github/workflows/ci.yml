name: CI

on:
  pull_request:
    branches: [main, master, passwords/master]
    paths:
      - "passwords/**"
  push:
    branches: [main, master, passwords/master]
    paths:
      - "passwords/**"

jobs:
  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: passwords/api
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            passwords/api/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('passwords/api/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Run unit tests
        run: cargo test --lib

      - name: Run integration tests
        run: cargo test --test integration_tests --features test-helpers

  js-tests:
    name: JS Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: passwords/app
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: passwords/app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit
