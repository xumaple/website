name: Rust Tests

on:
  workflow_call:

jobs:
  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest
    env:
      MONGO_USER: ${{ secrets.MONGO_USER }}
      MONGO_PW: ${{ secrets.MONGO_PW }}
      MONGO_ENDPOINT: ${{ secrets.MONGO_ENDPOINT }}
      USERS_DB_NAME: ${{ secrets.USERS_DB_NAME }}
      FRONTEND_ORIGIN: http://localhost:3000
    defaults:
      run:
        working-directory: passwords/api
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            passwords/api/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('passwords/api/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Run unit tests
        run: cargo test --lib

      - name: Run integration tests
        run: cargo test --test integration_tests --features test-helpers

      - name: Run concurrency tests
        run: cargo test --test concurrency_tests --features test-helpers

      - name: Run metrics tests
        run: cargo test --test metrics_tests --features test-helpers

      - name: Run backwards compatibility tests
        run: cargo test --test backcompat_tests --features test-helpers
